<!DOCTYPE html>
<html>
<head>
    <title>Open Source Licenses</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #121212; color: #eee; line-height: 1.6; }

        /* Navigation Styles - Fused into one class */
        .nav-header {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .nav-btn {
            background: #30363d;
            color: white;
            border: 1px solid #8b949e;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn:hover { background: #3c444d; }

        .license-item { background: #1e1e1e; padding: 20px; margin-bottom: 20px; border: 1px solid #333; border-radius: 5px; }
        pre { background: #000; color: #adbac7; padding: 15px; overflow: auto; white-space: pre-wrap; font-size: 12px; border: 1px solid #444; }
        h2 { color: #58a6ff; margin-top: 0; }
    </style>
</head>
<body>
    <div class="nav-header">
        <button class="nav-btn" onclick="window.api.navigate('launcher/menu.html', 'static')">
            Return to Main Menu
        </button>
        <button class="nav-btn" onclick="window.api.navigate('licenses/LICENSES.chromium.html', 'static')">
            See Chromium
        </button>
    </div>

    <h1>Third-Party Licenses</h1>
    <div id="container"></div>

    <script src="./licenses.js"></script>

    <script>
        (function render() {
            const container = document.getElementById('container');

            if (!window.licenseData) {
                container.innerHTML = "<h2>Error: window.licenseData not found. Check licenses.js</h2>";
                return;
            }

            Object.keys(window.licenseData).forEach(pkgName => {
                const info = window.licenseData[pkgName];
                const section = document.createElement('div');
                section.className = 'license-item';

                const title = document.createElement('h2');
                title.textContent = pkgName;

                const body = document.createElement('pre');
                body.textContent = info.licenseText || "No license text available.";

                section.appendChild(title);
                section.appendChild(body);
                container.appendChild(section);
            });
        })();
    </script>
</body>
</html>
